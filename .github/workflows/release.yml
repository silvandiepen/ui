name: Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  issues: write
  id-token: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify tests
        run: npm test

      - name: Verify types
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Verify docs types
        run: npm run docs:typecheck

      - name: Build docs app
        run: npm run docs:build

      - name: Get version before release
        id: pre-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release

      - name: Get version after release
        id: post-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Publish to npm
        if: steps.pre-version.outputs.version != steps.post-version.outputs.version
        run: npm publish --provenance
