name: Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write
  issues: write
  id-token: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify tests
        run: npm test

      - name: Verify types
        run: npm run typecheck

      - name: Build package
        run: npm run build

      - name: Verify docs types
        run: npm run docs:typecheck

      - name: Build docs app
        run: npm run docs:build

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
        run: npm run release
